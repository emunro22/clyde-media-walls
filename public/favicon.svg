<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5de0f5"/>
      <stop offset="100%" stop-color="#1265a0"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#080f1c"/>
    </linearGradient>
  </defs>

  <!-- Dark navy circle background -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)" stroke="url(#ring)" stroke-width="1.5"/>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#00c8f0" stroke-width="0.6" opacity="0.5"/>

  <!-- Simplified skyline silhouette (crane + SEC centre + city) -->
  <!-- City blocks left -->
  <rect x="4" y="13" width="2" height="4" fill="#00c8f0" opacity="0.9"/>
  <rect x="6.5" y="11.5" width="1.5" height="5.5" fill="#00c8f0" opacity="0.9"/>

  <!-- Crane vertical -->
  <rect x="9.5" y="7" width="1" height="10" fill="#00c8f0" opacity="0.95"/>
  <!-- Crane arm -->
  <rect x="7.5" y="7" width="5" height="0.9" fill="#00c8f0" opacity="0.95"/>
  <!-- Crane counterweight -->
  <rect x="7.5" y="7" width="1.5" height="2.2" fill="#5de0f5" opacity="0.85"/>

  <!-- SEC Centre curved roof (3 arches suggested) -->
  <path d="M11.5 17 Q12.5 13.5 13.5 17 Q14.5 13 15.5 17 Q16.5 13.5 17.5 17" stroke="#5de0f5" stroke-width="1" fill="none" opacity="0.95"/>

  <!-- Cathedral spires right -->
  <polygon points="19,17 19.6,11 20.2,17" fill="#00c8f0" opacity="0.9"/>
  <polygon points="20.5,17 21.2,13 21.9,17" fill="#00c8f0" opacity="0.8"/>
  <polygon points="22.2,17 22.7,14.5 23.2,17" fill="#5de0f5" opacity="0.7"/>

  <!-- Ground line -->
  <line x1="4" y1="17" x2="28" y2="17" stroke="#00c8f0" stroke-width="0.7" opacity="0.6"/>

  <!-- Label bar -->
  <rect x="4" y="19" width="24" height="8.5" rx="0" fill="#00c8f0" opacity="0.15"/>
  <rect x="4" y="19" width="24" height="8.5" rx="0" fill="none" stroke="#00c8f0" stroke-width="0.5" opacity="0.6"/>

  <!-- "CMW" text -->
  <text x="16" y="26" font-family="Arial, sans-serif" font-weight="700" font-size="5.5" fill="#5de0f5" text-anchor="middle" letter-spacing="1">CMW</text>
</svg>
